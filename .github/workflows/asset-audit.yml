name: Asset audit

on:
  pull_request:
    paths:
      - "src/assets/**"
      - "src/components/**"
      - "src/routes/**"
      - ".github/workflows/asset-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Measure image assets
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Report image inventory
        shell: bash
        run: |
          set -euo pipefail
          printf 'Largest image assets (bytes):\n'
          find src/assets -type f \( -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.webp' -o -iname '*.avif' \) -printf '%s %p\n' \
            | sort -nr \
            | tee asset-sizes.txt
          printf '\nTotals:\n' | tee -a asset-sizes.txt
          awk '{ total += $1; count += 1 } END { printf "files=%d bytes=%d mebibytes=%.2f\n", count, total, total / 1048576 }' asset-sizes.txt \
            | tee -a asset-sizes.txt

      - name: Upload asset inventory
        uses: actions/upload-artifact@v4
        with:
          name: asset-inventory
          path: asset-sizes.txt
          retention-days: 7
