name: Convert oversized images

on:
  pull_request:
    paths:
      - ".github/workflows/convert-oversized-images.yml"

permissions:
  contents: write

jobs:
  convert:
    name: Convert PNG assets to WebP
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install WebP tools
        run: |
          sudo apt-get update
          sudo apt-get install -y webp

      - name: Convert oversized PNG assets
        shell: bash
        run: |
          set -euo pipefail
          for source in src/assets/ZeroWastePin{1,2,3}.png src/assets/SustainablePin{1,2,3}.png src/assets/DecorPin{1,2,3}.png; do
            target="${source%.png}.webp"
            cwebp -quiet -q 82 -metadata none "$source" -o "$target"
          done
          sed -i 's/\.png";/\.webp";/g' src/lib/posts.ts
          rm src/assets/ZeroWastePin{1,2,3}.png src/assets/SustainablePin{1,2,3}.png src/assets/DecorPin{1,2,3}.png
          find src/assets -type f -iname '*.webp' -printf '%s %p\n' | sort -nr

      - name: Commit converted assets
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/assets src/lib/posts.ts
          git commit -m "Replace oversized PNG assets with WebP"
          git push origin HEAD:${{ github.head_ref }}
