name: Generate Bun Lockfile

on:
  push:
    branches:
      - adopt-bun-lockfile
    paths:
      - package.json
      - .github/workflows/generate-lockfile.yml

permissions:
  contents: write

jobs:
  generate:
    name: Generate and commit bun.lock
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: adopt-bun-lockfile

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Generate lockfile
        run: bun install

      - name: Verify full CI command
        run: bun run check:ci

      - name: Commit generated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git diff --cached --quiet && exit 0
          git commit -m "Add generated Bun lockfile"
          git push origin HEAD:adopt-bun-lockfile
