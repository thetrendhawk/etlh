name: Generate Bun Lockfile

on:
  push:
    branches:
      - adopt-bun-lockfile

permissions:
  contents: read

jobs:
  generate:
    name: Generate bun.lock artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Generate lockfile
        run: bun install

      - name: Verify full CI command
        run: bun run check:ci

      - name: Upload lockfile
        uses: actions/upload-artifact@v4
        with:
          name: bun-lockfile
          path: bun.lock
          if-no-files-found: error
