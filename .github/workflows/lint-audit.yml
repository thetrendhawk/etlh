name: Lint Audit

on:
  push:
    branches:
      - isolate-lint-debt

permissions:
  contents: read

jobs:
  lint:
    name: Audit existing lint debt
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint
