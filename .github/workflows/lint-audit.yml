name: Lint Audit

on:
  pull_request:
  push:
    branches:
      - isolate-lint-debt

permissions:
  contents: read

jobs:
  lint:
    name: Audit existing lint debt
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Capture lint output
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          bun run lint 2>&1 | tee lint-audit.txt

      - name: Upload lint audit
        uses: actions/upload-artifact@v4
        with:
          name: lint-audit
          path: lint-audit.txt
          if-no-files-found: error

      - name: Fail when lint fails
        if: steps.lint.outcome == 'failure'
        run: exit 1
