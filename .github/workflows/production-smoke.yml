name: Production smoke checks

on:
  workflow_dispatch:
  schedule:
    - cron: "17 14 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/production-smoke.yml"
      - "scripts/check-production.sh"
      - "src/**"
      - "package.json"

permissions:
  contents: read

concurrency:
  group: production-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Verify live ETLH production
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Allow production deployment to become ready
        if: github.event_name == 'push'
        run: sleep 30

      - name: Run production smoke checks
        shell: bash
        run: |
          set -o pipefail
          bun run check:production 2>&1 | tee production-smoke.log

      - name: Upload smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-diagnostics
          path: production-smoke.log
          retention-days: 7
