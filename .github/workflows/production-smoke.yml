name: Production smoke checks

on:
  workflow_dispatch:
  schedule:
    - cron: "17 14 * * *"

permissions:
  contents: read

concurrency:
  group: production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    name: Verify live ETLH production
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run production smoke checks
        run: bun run check:production
