name: Publication date cleanup

on:
  push:
    branches:
      - cleanup-publication-dates

permissions:
  contents: write

jobs:
  apply-cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cleanup-publication-dates
          fetch-depth: 0

      - name: Apply verified date cleanup
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_exact(path: str, old: str, new: str, expected: int = 1) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != expected:
                  raise SystemExit(f"{path}: expected {expected} occurrence(s), found {count}: {old!r}")
              file.write_text(text.replace(old, new))

          posts = "src/lib/posts.ts"
          replacements = {
              'slug: "low-waste-kitchen-tips-chef-habits",\n  title: "Low Waste Kitchen Tips: 11 Habits Chefs Use to Cut Food Waste",': 'slug: "low-waste-kitchen-tips-chef-habits",\n  title: "Low Waste Kitchen Tips: 11 Habits Chefs Use to Cut Food Waste",',
          }

          text = Path(posts).read_text()
          date_updates = [
              ('slug: "low-waste-kitchen-tips-chef-habits"', 'date: "2026-06-21"'),
              ('slug: "zero-waste-kitchen-budget-9-swaps"', 'date: "2025-06-22"'),
              ('slug: "small-apartment-eco-upgrade-checklist"', 'date: "2025-06-10"'),
              ('slug: "zero-waste-kitchen-ideas-tiny-apartments"', 'date: "2025-06-05"'),
              ('slug: "eco-friendly-small-apartment-decor-budget"', 'date: "2025-05-28"'),
              ('slug: "beginner-sustainable-living-checklist-renters"', 'date: "2025-05-20"'),
          ]
          for slug_marker, date_marker in date_updates:
              slug_pos = text.find(slug_marker)
              if slug_pos < 0:
                  raise SystemExit(f"Missing slug marker: {slug_marker}")
              date_pos = text.find(date_marker, slug_pos, slug_pos + 700)
              if date_pos < 0:
                  raise SystemExit(f"Missing expected date near {slug_marker}: {date_marker}")
              text = text[:date_pos] + 'date: "2026-06-22"' + text[date_pos + len(date_marker):]
          Path(posts).write_text(text)

          replace_exact(
              "src/components/PostCard.tsx",
              'import { getPublicationDate } from "@/lib/publicationDates";\n',
              "",
          )
          replace_exact(
              "src/components/PostCard.tsx",
              "  const publicationDate = getPublicationDate(post);\n",
              "",
          )
          replace_exact(
              "src/components/PostCard.tsx",
              '<time dateTime={publicationDate}>{formatDate(publicationDate)}</time>',
              '<time dateTime={post.date}>{formatDate(post.date)}</time>',
          )

          replace_exact(
              "src/routes/blog.$slug.tsx",
              'import { getPublicationDate } from "@/lib/publicationDates";\n',
              "",
          )
          replace_exact(
              "src/routes/blog.$slug.tsx",
              "    const publicationDate = getPublicationDate(p);\n",
              "    const publicationDate = p.date;\n",
          )
          replace_exact(
              "src/routes/blog.$slug.tsx",
              "  const publicationDate = getPublicationDate(post);\n",
              "  const publicationDate = post.date;\n",
          )

          replace_exact(
              "src/lib/sitemap.ts",
              'import { getPublicationDate } from "@/lib/publicationDates";\n',
              "",
          )
          replace_exact(
              "src/lib/sitemap.ts",
              "      lastmod: getPublicationDate(p),",
              "      lastmod: p.date,",
          )

          docs = Path("docs/05_Publishing_Workflow.md")
          doc_text = docs.read_text()
          doc_text = doc_text.replace(
              "- `src/lib/publicationDates.ts` for six temporary verified-date overrides\n",
              "",
          )
          old_section = '''Six legacy posts currently use temporary verified-date overrides in `src/lib/publicationDates.ts`. Until that cleanup is completed:\n\n- preserve the override behavior\n- do not add new overrides casually\n- do not treat the raw `date` value in `src/lib/posts.ts` as authoritative for those six posts\n\nNew articles should store the correct verified date directly in `src/lib/posts.ts`.'''
          new_section = '''The verified source date must be stored directly in `src/lib/posts.ts`. Do not add a second override layer for publication dates. If a legacy date is unsupported, correct the source record only after the replacement date has been explicitly verified.'''
          if old_section not in doc_text:
              raise SystemExit("Publishing workflow legacy date section was not found")
          doc_text = doc_text.replace(old_section, new_section)
          doc_text = doc_text.replace(
              "- Six legacy source dates still rely on temporary overrides.\n",
              "",
          )
          docs.write_text(doc_text)

          Path("src/lib/publicationDates.ts").unlink()

          remaining = []
          for path in Path("src").rglob("*.ts*"):
              source = path.read_text()
              if "publicationDates" in source or "getPublicationDate" in source:
                  remaining.append(str(path))
          if remaining:
              raise SystemExit(f"Obsolete publication date references remain: {remaining}")
          PY

      - name: Commit cleanup
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/posts.ts src/components/PostCard.tsx 'src/routes/blog.$slug.tsx' src/lib/sitemap.ts src/lib/publicationDates.ts docs/05_Publishing_Workflow.md
          git commit -m "Remove publication date override layer"
          git push origin HEAD:cleanup-publication-dates
