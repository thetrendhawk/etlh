name: Regenerate browser test lockfile

on:
  push:
    branches:
      - browser-accessibility-tests

permissions:
  contents: write

jobs:
  regenerate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: browser-accessibility-tests
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Regenerate Bun lockfile
        run: bun install
      - name: Commit lockfile
        run: |
          if git diff --quiet -- bun.lock; then
            echo "bun.lock already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "Regenerate lockfile for browser accessibility tests"
          git push origin HEAD:browser-accessibility-tests
