name: Regenerate Bun lockfile

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  regenerate-lockfile:
    if: github.head_ref == 'security-dependency-audit'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Regenerate lockfile
        run: bun install

      - name: Verify patched dependency and audit
        run: |
          bun pm ls undici
          bun audit --prod --audit-level=high

      - name: Commit generated lockfile
        run: |
          if git diff --quiet -- bun.lock; then
            echo "bun.lock is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "Regenerate Bun lockfile with patched undici"
          git push origin HEAD:${{ github.head_ref }}
