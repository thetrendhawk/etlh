name: Route audit

on:
  pull_request:
    paths:
      - "scripts/check-routes.ts"
      - ".github/workflows/route-audit.yml"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Capture route validation
        shell: bash
        run: |
          set +e
          bun run check:routes > route-check.txt 2>&1
          status=$?
          cat route-check.txt
          exit $status
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-check-output
          path: route-check.txt
          retention-days: 2
